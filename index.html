<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Hearing Aid</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#8ea6d9,#f5f7fa);
text-align:center;
padding-top:30px;
}

.container{
background:white;
width:90%;
max-width:420px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
margin-bottom:20px;
}

.section{
margin:22px 0;
}

select,input[type="range"]{
width:85%;
padding:10px;
margin-top:10px;
}

.status{
font-size:14px;
color:#555;
margin-top:6px;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#444;
color:white;
cursor:pointer;
margin:6px;
font-size:16px;
width:85%;
}

button:hover{
background:#43a047;
}

.transcription-box{
margin-top:15px;
padding:18px;
background:#f7f7f7;
border-radius:10px;
min-height:80px;
font-size:20px;
font-weight:500;
}

.battery-container{
width:85%;
margin:auto;
background:#ddd;
border-radius:10px;
}

.battery-bar{
height:15px;
background:#4CAF50;
border-radius:10px;
width:75%;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart Hearing Aid</h2>

<div class="section">

<b>Battery Status</b>

<div class="battery-container">
<div id="batteryBar" class="battery-bar"></div>
</div>

<div class="status">
Battery: <span id="batteryPercent">75</span>%
</div>

</div>

<div class="section">

<b>Language</b><br>

<select id="languageSelect">
<option value="en-US">English</option>
<option value="ml-IN">Malayalam</option>
</select>

</div>

<div class="section">

<b>Listening Mode</b><br>

<select onchange="updateMode(this.value)">
<option value="Quiet Mode">Quiet Mode</option>
<option value="Noisy Mode">Noisy Mode</option>
</select>

<div class="status">
Current: <span id="mode">Quiet Mode</span>
</div>

</div>

<div class="section">

<b>Volume Control</b><br>

<input type="range"
min="1"
max="6"
value="3"
oninput="updateVolume(this.value)">

<div class="status">
Gain: <span id="volume">3</span>
</div>

</div>

<div class="section">

<b>Live Transcription</b><br><br>

<button onclick="startRecognition()">Start Listening</button>
<button onclick="stopRecognition()">Stop Listening</button>

<div class="transcription-box" id="output">
Speech will appear here...
</div>

</div>

</div>

<script>

function updateVolume(val){
document.getElementById("volume").innerText=val;
}

function updateMode(val){
document.getElementById("mode").innerText=val;
}

let recognition;

function startRecognition(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Google Chrome for speech recognition.");
return;
}

recognition = new SpeechRecognition();

let selectedLang = document.getElementById("languageSelect").value;

recognition.lang = selectedLang;

recognition.continuous = true;
recognition.interimResults = true;

recognition.onresult = function(event){

let transcript = "";

for(let i = event.resultIndex; i < event.results.length; i++){
transcript += event.results[i][0].transcript;
}

document.getElementById("output").innerText = transcript;

};

recognition.start();

}

function stopRecognition(){

if(recognition){
recognition.stop();
}

}

let batteryLevel = 75;

function updateBattery(){

batteryLevel--;

if(batteryLevel < 20){
document.getElementById("batteryBar").style.background="red";
}

document.getElementById("batteryPercent").innerText = batteryLevel;
document.getElementById("batteryBar").style.width = batteryLevel + "%";

if(batteryLevel <= 0){
batteryLevel = 100;
}

}

setInterval(updateBattery,5000);

</script>

</body>
</html>
