<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Hearing Aid</title>

<style>

body{
font-family: 'Segoe UI', sans-serif;
background: linear-gradient(135deg,hsl(219, 43%, 64%),#f5f7fa);
text-align:center;
padding-top:30px;
}

.container{
background:white;
width:380px;
margin:auto;
padding:25px;
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

h2{
margin-bottom:20px;
letter-spacing:0.5px;
}

.section{
margin:22px 0;
}

select,input[type="range"]{
width:80%;
padding:8px;
margin-top:10px;
}

.status{
font-size:14px;
color:#555;
margin-top:6px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:hsl(127, 5%, 33%);
color:white;
cursor:pointer;
margin:4px;
font-size:14px;
}

button:hover{
background:#43a047;
}

.transcription-box{
margin-top:15px;
padding:15px;
background:#f7f7f7;
border-radius:10px;
min-height:70px;
font-size:22px;
font-weight:600;
line-height:1.4;
}

.battery-container{
width:80%;
margin:auto;
background:#ddd;
border-radius:10px;
}

.battery-bar{
height:15px;
background:#4CAF50;
border-radius:10px;
width:75%;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart Hearing Aid</h2>

<div class="section">
<label><b>Battery Status</b></label>

<div class="battery-container">
<div id="batteryBar" class="battery-bar"></div>
</div>

<div class="status">
Battery: <span id="batteryPercent">75</span>%
</div>
</div>

<div class="section">
<label><b>Listening Mode</b></label><br>

<select onchange="updateMode(this.value)">
<option value="Quiet Mode">Quiet Mode</option>
<option value="Noisy Mode">Noisy Mode</option>
</select>

<div class="status">
Current: <span id="mode">Quiet Mode</span>
</div>
</div>

<div class="section">
<label><b>Volume Control</b></label><br>

<input type="range"
min="1"
max="6"
value="3"
oninput="updateVolume(this.value)">

<div class="status">
Gain: <span id="volume">3</span>
</div>
</div>

<div class="section">
<label><b>Live Transcription</b></label><br><br>

<button onclick="startRecognition()">Start Listening</button>
<button onclick="stopRecognition()">Stop</button>

<div class="transcription-box" id="output">
Speech will appear here...
</div>
</div>

</div>

<script>

function updateVolume(val){
document.getElementById("volume").innerText=val;
}

function updateMode(val){
document.getElementById("mode").innerText=val;
}

let recognition;

function startRecognition(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Use Google Chrome or Safari for this feature.");
return;
}

recognition = new SpeechRecognition();

/* English model so Malayalam speech becomes Manglish */
recognition.lang = "en-US";

recognition.continuous = true;
recognition.interimResults = true;
recognition.maxAlternatives = 1;

recognition.onresult = function(event){

let transcript = "";

for(let i = event.resultIndex; i < event.results.length; i++){
transcript += event.results[i][0].transcript + " ";
}

document.getElementById("output").innerText = transcript;

};

recognition.start();

}

function stopRecognition(){
if(recognition){
recognition.stop();
}
}

let batteryLevel = 75;

function updateBattery(){

batteryLevel--;

if(batteryLevel < 20){
document.getElementById("batteryBar").style.background = "red";
}

document.getElementById("batteryPercent").innerText = batteryLevel;
document.getElementById("batteryBar").style.width = batteryLevel + "%";

if(batteryLevel <= 0){
batteryLevel = 100;
}

}

setInterval(updateBattery,5000);

</script>

</body>
</html>
