<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Smart Hearing Aid</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#8ea6d9,#f5f7fa);
text-align:center;
padding-top:30px;
}

.container{
background:white;
width:90%;
max-width:420px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.section{
margin:22px 0;
}

button{
padding:14px;
border:none;
border-radius:12px;
background:#444;
color:white;
cursor:pointer;
margin:6px;
font-size:16px;
width:85%;
}

button:hover{
background:#43a047;
}

.transcription-box{
margin-top:15px;
padding:18px;
background:#f7f7f7;
border-radius:10px;
min-height:60px;
font-size:20px;
font-weight:500;
}

.translation-box{
margin-top:10px;
padding:15px;
background:#eef2ff;
border-radius:10px;
min-height:50px;
font-size:18px;
}

</style>
</head>

<body>

<div class="container">

<h2>Smart Hearing Aid</h2>

<div class="section">

<b>Live Speech</b><br><br>

<button onclick="startRecognition()">Start Listening</button>
<button onclick="stopRecognition()">Stop</button>

<div class="transcription-box" id="manglish">
Manglish text appears here
</div>

<div class="translation-box" id="english">
English translation appears here
</div>

</div>

</div>

<script>

let recognition;

function startRecognition(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(!SpeechRecognition){
alert("Speech recognition not supported.");
return;
}

recognition = new SpeechRecognition();

recognition.lang = "en-US";
recognition.continuous = true;
recognition.interimResults = true;

recognition.onresult = function(event){

let transcript = "";

for(let i = event.resultIndex; i < event.results.length; i++){
transcript += event.results[i][0].transcript;
}

document.getElementById("manglish").innerText = transcript;

translateText(transcript);

};

recognition.start();

}

function stopRecognition(){

if(recognition){
recognition.stop();
}

}

async function translateText(text){

try{

let response = await fetch("https://libretranslate.de/translate",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
q:text,
source:"auto",
target:"en",
format:"text"
})
});

let data = await response.json();

document.getElementById("english").innerText = data.translatedText;

}catch(error){

document.getElementById("english").innerText="Translation unavailable";

}

}

</script>

</body>
</html>
